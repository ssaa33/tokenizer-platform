<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokenizer - Tokeniza Activos Reales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(59, 130, 246, 0.1);
            padding: 20px 30px;
            border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .footer {
            margin-top: 50px;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">🚀 Día 1 - Primer Proyecto</span>
        <h1>Tokenizer</h1>
        <p>Tokeniza y Vende Activos Reales al Mundo</p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number">$124M+</div>
                <div class="stat-label">Valor Tokenizado</div>
            </div>
            <div class="stat">
                <div class="stat-number">500+</div>
                <div class="stat-label">Activos</div>
            </div>
            <div class="stat">
                <div class="stat-number">15k+</div>
                <div class="stat-label">Inversores</div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Tokenizer - Creado por Sam And33</p>
            <p>GitHub: @ssaa33</p>
        </div>
    </div>
</body>
</html>
